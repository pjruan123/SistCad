<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Studio JM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="auth-body">
    <nav class="top-actions">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('login') }}">Login</a>
    </nav>
    <main class="auth-wrap">
        <form class="auth-card" method="post">
            <h1>Cadastro</h1>
            <p>Crie sua conta para agendar e acompanhar seus projetos.</p>
            {% include "_flash.html" %}
            <label for="nome">Nome</label>
            <input class="form-control" id="nome" name="nome" required>
            <label for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required>
            <label for="telefone">WhatsApp</label>
            <input class="form-control" id="telefone" name="telefone" placeholder="(31) 99999-9999">
            <label for="senha">Senha</label>
            <input class="form-control" id="senha" name="senha" type="password" minlength="6" required>
            <button class="btn btn-agendamento w-100 mt-4" type="submit">Criar conta</button>
        </form>
    </main>
</body>
</html>
