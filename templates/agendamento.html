<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Studio JM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/agendamento.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="agendamento-section">

    <nav class="top-actions">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('logout') }}">Sair</a>
    </nav>

    <div class="calendario-wrapper">
        <h2 class="panel-title text-center mb-3">Agende seu horário</h2>

        <div class="procedimento-select text-center">
            <select id="procedimentoSelect" class="form-select" style="width: auto; display: inline-block;">
                <option value="" disabled selected>Escolha o procedimento</option>
                <option value="Cílios">Cílios</option>
                <option value="Sobrancelhas">Sobrancelhas</option>
                <option value="Design com henna">Design com henna</option>
                <option value="Extensão de cílios">Extensão de cílios</option>
            </select>
        </div>

        <div class="calendario-header">
            <button id="prevMonth">&lt;</button>
            <span class="calendario-mes" id="mesAno"></span>
            <button id="nextMonth">&gt;</button>
        </div>

        <div class="dias-semana">
            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>

        <div class="dias-grid" id="diasGrid"></div>

        <div class="horarios-container" id="horariosContainer">
            <p class="msg-sem-horarios">Selecione um procedimento e clique em um dia para ver os horários.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/agendamento.js') }}"></script>
</body>
</html>
